name: 'CodeReviewAI'
description: '🤖 Intelligent AI-powered code review with multi-model support, static analysis integration, and security vulnerability detection'
author: 'CodeReviewAI Team'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  # AI Provider Configuration
  ai_provider:
    description: 'AI provider to use (openai, anthropic, gemini, ollama, auto)'
    required: false
    default: 'auto'
  openai_api_key:
    description: 'OpenAI API key'
    required: false
  anthropic_api_key:
    description: 'Anthropic (Claude) API key'
    required: false
  gemini_api_key:
    description: 'Google Gemini API key'
    required: false
  ollama_url:
    description: 'Ollama server URL for local LLM'
    required: false
    default: 'http://localhost:11434'
  ollama_model:
    description: 'Ollama model name'
    required: false
    default: 'codellama:7b'

  # Model Configuration
  model:
    description: 'Specific model to use (overrides auto-selection)'
    required: false
    default: ''
  max_tokens:
    description: 'Maximum tokens for AI response'
    required: false
    default: '4000'
  temperature:
    description: 'Temperature for AI response (0-1)'
    required: false
    default: '0.1'

  # Review Configuration
  review_mode:
    description: 'Review mode (full, incremental, security_only, performance_only)'
    required: false
    default: 'incremental'
  review_comment_languages:
    description: 'Languages for review comments (en, zh, zh-tw, ja, ko)'
    required: false
    default: 'en'
  exclude_patterns:
    description: 'File patterns to exclude (comma-separated)'
    required: false
    default: '**/*.lock,**/*.min.js,**/*.min.css,**/dist/**,**/node_modules/**'
  include_patterns:
    description: 'File patterns to include (comma-separated, empty means all)'
    required: false
    default: ''
  max_files:
    description: 'Maximum number of files to review'
    required: false
    default: '50'
  max_diff_size:
    description: 'Maximum diff size in KB'
    required: false
    default: '500'

  # Static Analysis Configuration
  enable_static_analysis:
    description: 'Enable static analysis tools'
    required: false
    default: 'true'
  security_checks:
    description: 'Enable security vulnerability checks'
    required: false
    default: 'true'
  quality_checks:
    description: 'Enable code quality checks'
    required: false
    default: 'true'
  performance_checks:
    description: 'Enable performance issue checks'
    required: false
    default: 'true'

  # Output Configuration
  comment_mode:
    description: 'How to post comments (review, comment, summary)'
    required: false
    default: 'review'
  post_general_comments:
    description: 'Post general PR comments'
    required: false
    default: 'true'
  fail_on_severity:
    description: 'Fail workflow on severity level (none, low, medium, high, critical)'
    required: false
    default: 'high'

  # Advanced Configuration
  custom_prompt:
    description: 'Custom system prompt for AI'
    required: false
    default: ''
  context_files:
    description: 'Additional context files to include (comma-separated paths)'
    required: false
    default: ''
  ignore_comments_from:
    description: 'Ignore comments from these users (comma-separated)'
    required: false
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'
