name: 'CodeReviewAI'

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    name: AI Code Review
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: CodeReviewAI
        uses: ./
        with:
          # AI Provider Configuration (choose one or use 'auto')
          ai_provider: 'auto'
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          
          # Model Configuration
          model: ''  # Leave empty for auto-selection
          max_tokens: '4000'
          temperature: '0.1'
          
          # Review Configuration
          review_mode: 'incremental'
          review_comment_languages: 'en,zh'
          exclude_patterns: '**/*.lock,**/*.min.js,**/*.min.css,**/dist/**,**/node_modules/**,**/*.md'
          max_files: '50'
          max_diff_size: '500'
          
          # Static Analysis Configuration
          enable_static_analysis: 'true'
          security_checks: 'true'
          quality_checks: 'true'
          performance_checks: 'true'
          
          # Output Configuration
          comment_mode: 'review'
          post_general_comments: 'true'
          fail_on_severity: 'high'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
